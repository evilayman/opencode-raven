name: Opencode Raven
repo: https://github.com/evilayman/opencode-raven
tagline: Hard-enforced search delegation — blocks search tools and routes them to a dedicated @raven agent
description: >
  Search-first subagent plugin for opencode. Intercepts 6 search tools (Exa, Grep.app, grep, glob, etc.)
  for all non-Raven agents and redirects them to a dedicated @raven agent with Context7, Exa AI, and Grep.app MCPs.
  Saves tokens by using a cheap/free model for search, hard-enforces delegation so agents can't ignore it,
  and works with any agent or workflow. Includes /raven on|off|model|status toggle command.
tags:
  - search
  - subagent
  - mcp
  - cost-saving